<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}wc26arena.com · Rank every World Cup 26 player{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon.svg') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/favicon.svg') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/brand.css') }}">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-S1BPT4EZH2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-S1BPT4EZH2');
    </script>

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4040947597256165"
            crossorigin="anonymous"></script>
</head>

<body class="wc-pattern">
    {% include "components/nav.html" %}
    {% include "components/ticker.html" %}

    <main>
        {% block header_content %}{% endblock %}
    </main>

    {% include "components/footer.html" %}

    <div class="wc-footer-strip">
        <span class="can"></span>
        <span class="mex"></span>
        <span class="usa"></span>
    </div>

    <script src="{{ url_for('static', filename='scripts/streak.js') }}"></script>
    <script src="{{ url_for('static', filename='scripts/ticker.js') }}"></script>
    <script src="{{ url_for('static', filename='scripts/tally.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
