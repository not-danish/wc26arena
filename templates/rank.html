{% extends "base.html" %}

{% block header_content %}
<section class="wc-rank-page">
    <div class="wc-rank-heading animate__animated animate__fadeInDown">
        <h1>Pick Your Player</h1>
        <p>Tap the footballer you rate higher · Their ELO will rise</p>
    </div>

    <div id="wc_filter_banner" class="wc-filter-banner hidden">
        <div>
            <div class="label">Ranking from</div>
            <div class="matchup" id="wc_filter_matchup">—</div>
        </div>
        <a href="/rank">Clear filter ✕</a>
    </div>

    <div id="loading_message" class="wc-loading">Loading matchup…</div>

    {% include "components/player_card.html" %}

    <div id="wc_skip_row" class="wc-skip-row hidden">
        <button id="wc_skip_btn" type="button" class="wc-skip-btn">
            Skip matchup →
        </button>
    </div>
</section>
{% endblock %}

{% block scripts %}
    <script type="module" src="{{ url_for('static', filename='scripts/updateFirebase.js') }}"></script>
{% endblock %}
