{% extends "base.html" %}

{% block header_content %}
<section class="wc-leaderboard-page">
    <div class="wc-leaderboard-wrap">
        <div class="wc-leaderboard-heading animate__animated animate__fadeInDown">
            <h1>The Hall of Fame</h1>
            <p>Top 100 footballers · Live ELO</p>
        </div>

        <div class="wc-filter-row" id="wc_filters">
            <select id="filter_group"><option value="">All groups</option></select>
            <select id="filter_country"><option value="">All countries</option></select>
            <select id="filter_position"><option value="">All positions</option></select>
            <button class="reset" id="filter_reset">Reset</button>
        </div>

        {% include "components/leaderboard_table.html" %}
    </div>
</section>
{% endblock %}

{% block scripts %}
    <script src="{{ url_for('static', filename='scripts/leaderboard.js') }}"></script>
{% endblock %}
