<div id="player_grid" class="wc-versus hidden">
  {% for i in range(1,3) %}
    <div id="player_{{i}}_card" class="wc-card animate__animated animate__fadeIn animate__slower">
        <div class="wc-card-img-frame">
            <img id="player_{{i}}_image" src="" alt="">
        </div>
        <h2 id="player_{{i}}_name" class="wc-name"></h2>
        <p id="player_{{i}}_club" class="wc-meta"></p>
        <div><span id="player_{{i}}_position" class="wc-position"></span></div>
        <div class="wc-select-hint">Tap to vote</div>
    </div>

    {% if i == 1 %}
      <div class="vs-divider">VS</div>
    {% endif %}
  {% endfor %}
</div>
